spring.application.name=transport
server.address=0.0.0.0
server.port=${PORT:8081}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URL}

# Max upload sizes
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

spring.jackson.serialization.write-dates-as-timestamps=false
logging.level.com.transport.transport=DEBUG

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expires=604800

spring.main.allow-bean-definition-overriding=true
app.google.client-id=620492568173-kp008ht9vks13j4gibpif4p5597tv14g.apps.googleusercontent.com
app.internal.provisioning-secret=${INTERNAL_PROVISIONING_SECRET:transport-static-secret}

# Email provider
resend.api.key=${RESEND_API_KEY}
# En prod, definir RESEND_FROM avec une adresse de votre domaine verifie.
resend.from=${RESEND_FROM:support@yemchi-w-yji.tn}
resend.provider=resend

app.verification.base-url=https://yemchi-w-yji-front.vercel.app/verify-email
ors.api.key=${ORS_API_KEY:}
app.vehicle-analysis.url=${VEHICLE_ANALYSIS_URL:https://anderson-meant-provincial-practitioners.trycloudflare.com/webhook/analyze-order}
app.vehicle-analysis.timeout-ms=${VEHICLE_ANALYSIS_TIMEOUT_MS:8000}
app.vehicle-analysis.alert-email=${VEHICLE_ANALYSIS_ALERT_EMAIL:manoubi.rafrafi109@gmail.com}
